syntax = "proto3";
package test.gaql;

import "helpers.proto";

enum SampleStatus {
  SAMPLE_STATUS_UNSPECIFIED = 0;
  ENABLED = 1;
  PAUSED = 2;
}

message Campaign {
  string resource_name = 1;
  int64 id = 2;
  string name = 3;
  SampleStatus status = 4;
  NetworkSettings network_settings = 5;
  repeated string final_urls = 6;
  repeated CustomParam url_custom_parameters = 7;
}
