name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          # Use PAT so that pushes to the release branch trigger downstream
          # CI workflows. GITHUB_TOKEN pushes do not, which otherwise forces
          # a manual empty-commit to kick CI on the changesets release PR.
          token: ${{ secrets.CHANGESETS_GH_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Create Release PR or Publish
        id: changesets
        continue-on-error: true
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
          commit: "chore: release packages"
          title: "chore: release packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          # npm provenance: signs the published tarball via GH Actions OIDC
          # so npm shows a "verified publisher" badge.
          NPM_CONFIG_PROVENANCE: "true"

      - name: Verify published versions match local
        # Only run when changesets claimed it published. This step compensates
        # for publish/registry flakiness: npm can accept a publish and still
        # take a short window before `npm view` sees the new version. Skipped
        # when the action opened a Version PR instead of publishing.
        if: steps.changesets.outputs.published == 'true'
        run: |
          set -e

          expected=()
          while IFS= read -r package_json; do
            name=$(node -p "require('./$package_json').name")
            local_version=$(node -p "require('./$package_json').version")
            is_private=$(node -p "require('./$package_json').private || false")
            if [ "$is_private" = "true" ]; then
              echo "$name@$local_version (private, skipped)"
              continue
            fi
            expected+=("$name@$local_version")
          done < <(find packages -mindepth 2 -maxdepth 2 -name package.json | sort)

          if [ "${#expected[@]}" -eq 0 ]; then
            echo "No public packages found to verify"
            exit 0
          fi

          missing=()
          for attempt in {1..12}; do
            missing=()
            echo "npm visibility check attempt $attempt/12"

            for package in "${expected[@]}"; do
              if npm view "$package" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
                echo "$package published"
              else
                echo "$package not visible on npm yet"
                missing+=("$package")
              fi
            done

            if [ "${#missing[@]}" -eq 0 ]; then
              exit 0
            fi

            if [ "$attempt" -lt 12 ]; then
              echo "Waiting for npm registry propagation: ${missing[*]}"
              sleep 10
            else
              echo "Packages still missing on npm after retries: ${missing[*]}"
              exit 1
            fi
          done

      - name: Enable auto-merge on release PR
        if: always() && steps.changesets.outputs.pullRequestNumber != ''
        env:
          GH_TOKEN: ${{ secrets.CHANGESETS_GH_TOKEN }}
        run: gh pr merge ${{ steps.changesets.outputs.pullRequestNumber }} --auto --squash --repo "$GITHUB_REPOSITORY"
