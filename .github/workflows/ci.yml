name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck all packages
        run: |
          for pkg in packages/sdk-runtime packages/meta-business-sdk packages/tiktok-business-sdk packages/google-ads-sdk packages/ad-platforms; do
            echo "::group::typecheck $pkg"
            (cd "$pkg" && bun run typecheck)
            echo "::endgroup::"
          done

      - name: Run tests
        run: |
          for pkg in packages/sdk-runtime packages/meta-business-sdk packages/tiktok-business-sdk packages/google-ads-sdk packages/ad-platforms; do
            echo "::group::test $pkg"
            (cd "$pkg" && bun test tests/) || exit 1
            echo "::endgroup::"
          done
